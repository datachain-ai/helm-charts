{{- if .Values.postgres.enabled -}}
apiVersion: v1
kind: Secret
metadata:
  name: studio-postgres
  {{ if (not (hasKey .Values "ci")) }} # Add annotation if we're not in CI execution.
  annotations:
    helm.sh/resource-policy: "keep"
    argocd.argoproj.io/sync-options: Delete=false
  {{- end }}
  labels:
    {{- include "studio.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.global.postgres.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.global.postgres.password | quote }}
  POSTGRES_DB: {{ .Values.global.postgres.databaseName | quote }}
{{- end }}
