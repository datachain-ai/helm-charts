{{- if .Values.clickhouse.enabled -}}
apiVersion: v1
kind: Secret
metadata:
  name: studio-clickhouse
  {{ if (not (hasKey .Values "ci")) }} # Add annotation if we're not in CI execution.
  annotations:
    helm.sh/resource-policy: "keep"
    argocd.argoproj.io/sync-options: Delete=false
  {{- end }}
  labels:
    {{- include "studio.labels" . | nindent 4 }}
type: Opaque
stringData:
  CLICKHOUSE_USER: {{ .Values.clickhouse.auth.username | quote }}
  CLICKHOUSE_PASSWORD: {{ .Values.clickhouse.auth.password | quote }}
{{- end }}
