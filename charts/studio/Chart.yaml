apiVersion: v2
name: studio
description: A Helm chart for Kubernetes
type: application
version: 0.20.2
appVersion: "v2.242.1"
maintainers:
  - name: iterative
    email: support@iterative.ai
icon: "https://static.iterative.ai/logo/studio.svg"
dependencies:
  - name: valkey
    condition: valkey.enabled
    version: "0.9.4"
    repository: "https://valkey.io/valkey-helm"
  - name: vector
    condition: vector-agent.enabled
    version: "0.52.0"
    repository: "https://helm.vector.dev"
    alias: vector-agent
  - name: vector
    condition: vector-aggregator.enabled
    version: "0.52.0"
    repository: "https://helm.vector.dev"
    alias: vector-aggregator
